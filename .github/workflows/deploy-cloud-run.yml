name: Deploy Cloud Run Backend

on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        default: us-central1
        required: true
      service:
        description: Cloud Run service name
        default: pakstudy-hub-api
        required: true

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify Google auth secret
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: GCP_SERVICE_ACCOUNT_JSON"
            echo "Add it under Settings > Secrets and variables > Actions > Repository secrets."
            echo "It must contain a Google Cloud service account JSON for project pakstudy-hub-d418b."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: pakstudy-hub-d418b

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "${{ inputs.service }}" \
            --source . \
            --project pakstudy-hub-d418b \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --set-env-vars NODE_ENV=production,FIREBASE_PROJECT_ID=pakstudy-hub-d418b,GOOGLE_CLOUD_PROJECT=pakstudy-hub-d418b,FIREBASE_STORAGE_BUCKET=pakstudy-hub-d418b.firebasestorage.app,PAYMENTS_CURRENCY=pkr,OPENAI_MODEL=gpt-4.1-mini,BIGQUERY_ENABLED=false

      - name: Show service URL
        run: |
          gcloud run services describe "${{ inputs.service }}" \
            --project pakstudy-hub-d418b \
            --region "${{ inputs.region }}" \
            --format='value(status.url)'
