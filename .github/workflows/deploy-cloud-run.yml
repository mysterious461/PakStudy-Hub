name: Deploy Cloud Run Backend

on:
  workflow_dispatch:
    inputs:
      region:
        description: Google Cloud region
        default: us-central1
        required: true
      service:
        description: Cloud Run service name
        default: pakstudy-hub-api
        required: true
      runtime_service_account:
        description: Cloud Run runtime service account
        default: 41032167808-compute@developer.gserviceaccount.com
        required: true
      storage_bucket:
        description: Firebase Storage bucket name from Firebase Console > Storage
        default: pakstudy-hub-d418b.firebasestorage.app
        required: true

jobs:
  deploy-cloud-run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify Google auth secret
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: GCP_SERVICE_ACCOUNT_JSON"
            echo "Add it under Settings > Secrets and variables > Actions > Repository secrets."
            echo "It must contain a Google Cloud service account JSON for project pakstudy-hub-d418b."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: pakstudy-hub-d418b

      - name: Verify required Google APIs
        run: |
          missing=0
          for api in run.googleapis.com cloudbuild.googleapis.com artifactregistry.googleapis.com secretmanager.googleapis.com; do
            if ! gcloud services list \
              --enabled \
              --project pakstudy-hub-d418b \
              --filter="config.name=$api" \
              --format="value(config.name)" | grep -q "$api"; then
              echo "Missing required API: $api"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Enable the missing APIs from Google Cloud Console, or grant the CI service account Service Usage Admin."
            echo "Console: https://console.cloud.google.com/apis/library?project=pakstudy-hub-d418b"
            exit 1
          fi

      - name: Check Artifact Registry source repository
        run: |
          if ! gcloud artifacts repositories describe cloud-run-source-deploy \
            --project pakstudy-hub-d418b \
            --location "${{ inputs.region }}" >/dev/null 2>&1; then
            echo "::warning title=Artifact Registry repository missing::cloud-run-source-deploy does not exist in ${{ inputs.region }}. Continuing so gcloud run deploy can create it if the CI service account has Artifact Registry Administrator."
          else
            echo "Artifact Registry repository cloud-run-source-deploy exists in ${{ inputs.region }}."
          fi

      - name: Verify Firebase Storage bucket
        run: |
          if ! gcloud storage buckets describe "gs://${{ inputs.storage_bucket }}" --project pakstudy-hub-d418b >/dev/null 2>&1; then
            echo "Missing Firebase Storage bucket: ${{ inputs.storage_bucket }}"
            echo "Open Firebase Console > Build > Storage for project pakstudy-hub-d418b."
            echo "If Storage is not set up, click Get started and create the default bucket."
            echo "If Storage is already set up, copy the exact bucket name and rerun this workflow with that value."
            exit 1
          fi
          echo "Firebase Storage bucket exists: ${{ inputs.storage_bucket }}"

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy "${{ inputs.service }}" \
            --source . \
            --project pakstudy-hub-d418b \
            --region "${{ inputs.region }}" \
            --allow-unauthenticated \
            --service-account "${{ inputs.runtime_service_account }}" \
            --quiet \
            --set-env-vars NODE_ENV=production,FIREBASE_PROJECT_ID=pakstudy-hub-d418b,GOOGLE_CLOUD_PROJECT=pakstudy-hub-d418b,FIREBASE_STORAGE_BUCKET=${{ inputs.storage_bucket }},PAYMENTS_CURRENCY=pkr,OPENAI_MODEL=gpt-4.1-mini,BIGQUERY_ENABLED=false

      - name: Show service URL
        run: |
          gcloud run services describe "${{ inputs.service }}" \
            --project pakstudy-hub-d418b \
            --region "${{ inputs.region }}" \
            --format='value(status.url)'
