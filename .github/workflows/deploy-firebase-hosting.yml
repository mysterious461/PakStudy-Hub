name: Deploy Firebase Hosting

on:
  workflow_dispatch:

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Verify Google auth secret
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing GitHub secret: GCP_SERVICE_ACCOUNT_JSON"
            echo "Add it under Settings > Secrets and variables > Actions > Repository secrets."
            echo "It must contain a Google Cloud service account JSON for project pakstudy-hub-d418b."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Verify Firebase project access
        run: |
          echo "Checking Firebase project access for pakstudy-hub-d418b..."
          firebase projects:list --json --non-interactive
          firebase apps:list --project pakstudy-hub-d418b --json --non-interactive

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project pakstudy-hub-d418b --non-interactive
